<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1386.ai</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">

    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="sidebar-content">
        <div class="sidebar-header">
          <button class="btn-new-chat" id="btn-new-chat" aria-label="New chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            new chat
          </button>
        </div>
        <div class="chat-list" id="chat-list"></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-title" id="topbar-title">1386.ai</div>
      </div>

      <div class="messages" id="messages">
        <div class="messages-inner" id="messages-inner">
          <div class="empty-state" id="empty-state">
            <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <div class="empty-state-text">1386.ai</div>
            <div class="empty-state-sub">type a message below</div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-inner">
          <div class="input-row">
            <textarea id="input" rows="1" placeholder="Message..." aria-label="Message input"></textarea>
            <button class="btn-send" id="btn-send" disabled aria-label="Send message">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
          <div class="input-footer">
            <div class="model-selector">
              <label for="model-select">model</label>
              <select id="model-select" aria-label="Select model"></select>
            </div>
            <span class="input-hint">enter to send</span>
          </div>
        </div>
      </div>
    </main>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
