# plasma 1.1 finetune
model:
  vocab_size: 48000
  hidden_size: 1280
  num_layers: 26
  num_heads: 20
  num_kv_heads: 4
  intermediate_size: 3584
  max_seq_len: 1024
  dropout: 0.0
  rope_theta: 10000.0

training:
  batch_size: 16
  micro_batch_size: 2
  gradient_accumulation: 8
  max_steps: 30000
  warmup_steps: 500
  learning_rate: 1.5e-5
  min_lr: 1.5e-6
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: bf16
  gradient_checkpointing: true
  checkpoint_interval: 5000
  eval_interval: 1000
  log_interval: 50
  use_loss_mask: true
  checkpoint_prefix: 1.1_ft_step

data:
  shard_dir: data/instruct_shards_1.1
  tokenizer_path: data/tokenizer_1.1.model
  seq_len: 1024
