# plasma 1.0 pretrain
model:
  vocab_size: 32000
  hidden_size: 1024
  num_layers: 18
  num_heads: 16
  num_kv_heads: 4
  intermediate_size: 2816
  max_seq_len: 1024
  dropout: 0.0
  rope_theta: 10000.0

training:
  batch_size: 32
  micro_batch_size: 4
  gradient_accumulation: 8
  max_steps: 100000
  warmup_steps: 2000
  learning_rate: 1.5e-4
  min_lr: 1.5e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: bf16
  gradient_checkpointing: true
  checkpoint_interval: 5000
  eval_interval: 2000
  log_interval: 50
  checkpoint_prefix: 1.0_step

data:
  shard_dir: data/shards_1.0
  tokenizer_path: data/tokenizer_1.0.model
  seq_len: 1024
