# plasma 1.0 finetune
model:
  vocab_size: 32000
  hidden_size: 1024
  num_layers: 18
  num_heads: 16
  num_kv_heads: 4
  intermediate_size: 2816
  max_seq_len: 1024
  dropout: 0.0
  rope_theta: 10000.0

training:
  batch_size: 16
  micro_batch_size: 4
  gradient_accumulation: 4
  max_steps: 20000
  warmup_steps: 500
  learning_rate: 2.0e-5
  min_lr: 2.0e-6
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: bf16
  gradient_checkpointing: true
  checkpoint_interval: 3000
  eval_interval: 1000
  log_interval: 50
  use_loss_mask: true
  checkpoint_prefix: 1.0_ft_step

data:
  shard_dir: data/instruct_shards_1.0
  tokenizer_path: data/tokenizer_1.0.model
  seq_len: 1024
